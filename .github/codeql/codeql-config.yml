# CodeQL configuration — honored by GitHub "default setup" AND the local
# tools/codeql-local.sh simulation. Scopes scanning to PRODUCTION source only.
name: "RemotePower CodeQL config"

# Don't scan generated/duplicated trees or test fixtures — they aren't shipped
# code and produce only noise:
#   - packaging/aur/*/{src,pkg}: gitignored makepkg build copies of the source
#     (CodeQL would flag every finding 2-3x over from these duplicates).
#   - tests/: deliberately exercise edge cases (e.g. allow TLSv1 to verify the
#     monitor handles legacy servers, use example hostnames) — not prod code.
#   - .codeql-cache/, site/, design/: tooling / marketing / scratch.
paths-ignore:
  - packaging/aur
  - tests
  - .codeql-cache
  - site
  - design
  - docs

# Reviewed false-positive RULE classes that are inherent to this app's design.
# Each was triaged against the source (see docs/security-review-5.0.1.md); none is
# exploitable. XSS / injection / SSRF / auth queries stay FULLY ACTIVE — only the
# rules that fundamentally cannot distinguish this app's by-design patterns are
# scoped out, with the reason recorded here for transparency.
query-filters:
  # Server persists + handles HASHED/encrypted secrets (bcrypt/PBKDF2 password
  # hashes, AES-GCM vault) to 0600 files by design; CodeQL can't tell a hashed
  # value from plaintext, so save()/log of a blob that *contains* a hash trips it.
  - exclude:
      id: py/clear-text-storage-sensitive-data
  - exclude:
      id: py/clear-text-logging-sensitive-data
  # tls_monitor.py MUST offer legacy protocols to PROBE old servers' certs — a
  # monitoring probe, never a client connection that carries our data.
  - exclude:
      id: py/insecure-protocol
  # The two hits are an HMAC-SHA256 audit-chain MAC and a usedforsecurity=False
  # dedup fingerprint — neither is password hashing (passwords use bcrypt/PBKDF2).
  - exclude:
      id: py/weak-sensitive-data-hashing
  # The client api() helper only fetches this app's OWN API (same-origin; CSP
  # connect-src 'self' blocks anything else). Not server-side SSRF.
  - exclude:
      id: js/request-forgery
