# Publish the RemotePower server image to the GitHub Container Registry
# (ghcr.io) when a release is published on the PRODUCTION repo.
#
# Division of labour, on purpose:
#   - The signed release tarball (.tar.gz + .sha256 + .asc) is built and signed
#     LOCALLY with `make release` and uploaded by hand via `gh release create`.
#     The GPG signing key never touches CI.
#   - This workflow only builds + pushes the Docker image, authenticating with
#     the auto-provisioned GITHUB_TOKEN (no secrets to manage).
#
# Trigger: a published GitHub Release (the `gh release create` step of the
# production promotion). `workflow_dispatch` lets you re-run for a given tag.
name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build, e.g. v4.6.0"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # v5.4.1 (C7): SLSA build-provenance attestation

jobs:
  docker:
    # Only the production repo publishes images. Guards against an accidental
    # publish if Actions is ever re-enabled on the test remote (tyxak/claude-code).
    if: github.repository == 'tyxak/remotepower'
    runs-on: ubuntu-latest
    # The emulated arm64 leg pushes this past the amd64-only ~10 min; 60 gives
    # generous headroom for a cold-cache multi-arch build.
    timeout-minutes: 60
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      # QEMU provides the binfmt handlers so the amd64 runner can build the
      # arm64 image too (emulated). cryptography/bcrypt ship arm64 wheels, so
      # the slow part is the emulated apt layer, not pip.
      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # The release tag (vX.Y.Z) drives the version; also tag X.Y and latest.
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name || github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name || github.event.inputs.tag }}
            # Don't move :latest to a prerelease (manual dispatch counts as stable).
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch: amd64 (common server) + arm64 (SBC / Ampere management
          # nodes). The arm64 leg is emulated via QEMU so it's slower — see the
          # bumped job timeout. Drop back to `linux/amd64` if build time hurts.
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true   # v5.4.1 (C7): attach SLSA build provenance to the image

  # The containerized AGENT image (a separate package: ghcr.io/tyxak/remotepower-agent).
  # Same trigger/guard/multi-arch as the server image, built from Dockerfile.agent.
  # FIRST PUBLISH ONLY: GitHub creates the new package PRIVATE — flip it public once
  # (Packages → remotepower-agent → Package settings → Change visibility → Public, or
  #  gh api -X PATCH /user/packages/container/remotepower-agent/visibility -f visibility=public).
  docker-agent:
    if: github.repository == 'tyxak/remotepower'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name || github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name || github.event.inputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true   # v5.4.1 (C7): attach SLSA build provenance to the image
