name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like RemotePower to do?
    validations:
      required: true
  - type: dropdown
    id: segment
    attributes:
      label: Who is this for?
      multiple: true
      options:
        - Homelab
        - Linux fleets
        - Semi-enterprise
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
