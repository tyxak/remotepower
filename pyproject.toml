# RemotePower — Python tooling configuration.
# Used by `make lint`, `make format`, and `make typecheck`.
#
# Dev-tool versions are PINNED (installed by `make install-dev`):
#   black 26.5.1 · isort 8.0.1 · mypy 2.1.0
# Rationale: formatter output changes between releases; an unpinned black
# eventually flags files its predecessor formatted and `make lint` rots.
# Bump all three deliberately, re-run `make format` on LINT_SRC, and commit
# the reformat in the same change as the pin bump.

[tool.black]
line-length = 100
target-version = ["py311", "py312", "py313", "py314"]
# We don't want black reformatting the bundled vendored libs (none yet, but
# leave the stanza so we don't have to scramble later).
extend-exclude = '''
/(
    \.git
  | __pycache__
  | client/__pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["api", "cmdb_vault", "cve_scanner", "prometheus_export", "smtp_notifier", "ldap_auth"]
# CGI scripts often import sibling modules with no package — make isort tolerate that.
default_section = "THIRDPARTY"

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true   # cryptography, ldap3, reportlab, psutil are all optional
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
# The codebase predates type hints — start permissive and tighten later.
check_untyped_defs = false
disallow_untyped_defs = false
# Per-module strictness (tightened gradually as code is annotated).
[[tool.mypy.overrides]]
module = ["cmdb_vault"]
disallow_untyped_defs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = ["openapi_spec"]
disallow_untyped_defs = true
check_untyped_defs = true
