# /etc/nginx/snippets/remotepower-locations.conf
#
# RemotePower — shared location {} blocks, included by BOTH the HTTP and the
# HTTPS server blocks in remotepower.conf so the routing is defined exactly once
# (no HTTP/HTTPS drift). Server-level directives (security headers, gzip, body
# caps) live in each server block, not here — `add_header` inheritance is
# per-server, and the locations that set their own add_header re-emit the full
# header set below.

# ── Defense in depth: never serve the CGI directory as static files ───────
# cgi-bin/ holds the Python backend and lives inside the web root
# (SCRIPT_FILENAME points at it). It is only ever executed via /api/ through
# fcgiwrap (SCRIPT_FILENAME is a filesystem path, not this URL), so the
# /cgi-bin/ URL should never resolve to a static file. `^~` beats the regex
# matchers below.
location ^~ /cgi-bin/ {
    deny all;
}

# ── CA cert for agent bootstrap (v4.5.0 "TrustMatters") ───────────────────
# Serves the self-signed CA's PUBLIC cert so agents can fetch it on first
# contact. Safe over plain HTTP: clients pin it by SHA-256 fingerprint
# (install-client.sh --ca-fingerprint). 404s harmlessly when no self-signed CA
# is in use (real-cert / Let's Encrypt deployments). The file is written by
# tools/gen-ca.sh; gen-ca.sh --nginx also drops a managed copy of this block.
location = /ca.crt {
    alias /etc/remotepower/tls/ca.crt;
    default_type application/x-x509-ca-cert;
    add_header Content-Disposition 'attachment; filename="ca.crt"';
}

# ── API backend — pick ONE of the blocks below ────────────────────────────
#
# (A) OPTIONAL (v4.3.0 perf): persistent SCGI prefork worker. api.py is
# imported once at service start and forked per request, removing the
# per-request Python startup + source-parse tax classic CGI pays on every
# dashboard poll and agent heartbeat. To enable:
#   cp server/conf/remotepower-api.service /etc/systemd/system/
#   systemctl daemon-reload && systemctl enable --now remotepower-api
# then replace the fcgiwrap location below with:
#
# location /api/ {
#     include scgi_params;
#     scgi_pass            unix:/run/remotepower/api.sock;
#     scgi_param PATH_INFO $uri;
#     scgi_param HTTP_X_TOKEN $http_x_token;
#     scgi_param RP_DATA_DIR /var/lib/remotepower;
#     scgi_read_timeout 130s;
# }
#
# (C) OPTIONAL (v5.5.0, experimental): fully-persistent gunicorn WSGI tier
# (threaded workers, thread-local request isolation — no fork). Pair with
# remotepower-scheduler.service + RP_EXTERNAL_SCHEDULER=1. To enable:
#   pip install gunicorn
#   cp server/conf/remotepower-wsgi.service /etc/systemd/system/
#   systemctl daemon-reload && systemctl enable --now remotepower-wsgi
# then replace the fcgiwrap location below with (the worker reads X-Token,
# PATH_INFO, method, body, etc. straight from the proxied HTTP request — no
# fastcgi/scgi params needed):
#
# location /api/ {
#     proxy_pass            http://127.0.0.1:8090;
#     proxy_set_header Host $host;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_read_timeout 130s;
# }
#
# (B) DEFAULT: classic Python CGI via fcgiwrap (zero extra services).
location /api/ {
    # Optional IP allowlist for internet-facing deployments — see the
    # "Network exposure" note in remotepower.conf (must include agent source IPs).
    # include /etc/nginx/snippets/rp-allowlist.conf;

    # Rate limiting — enable after adding zones to /etc/nginx/nginx.conf http block.
    # limit_req  zone=rp_api burst=50 nodelay;
    # limit_conn rp_conn 20;

    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api_cgi.py;
    fastcgi_param PATH_INFO $uri;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param CONTENT_TYPE $content_type;
    fastcgi_param CONTENT_LENGTH $content_length;
    fastcgi_param HTTP_X_TOKEN $http_x_token;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param REMOTE_ADDR $remote_addr;

    # Extended timeout for /api/exec/wait long-poll
    fastcgi_read_timeout 130s;

    limit_except GET POST DELETE PATCH {
        deny all;
    }
}

# Stricter rate limit for login endpoint
location = /api/login {
    # limit_req zone=rp_login burst=3 nodelay;

    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api_cgi.py;
    fastcgi_param PATH_INFO $uri;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param CONTENT_TYPE $content_type;
    fastcgi_param CONTENT_LENGTH $content_length;
    fastcgi_param HTTP_X_TOKEN $http_x_token;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param REMOTE_ADDR $remote_addr;
    fastcgi_read_timeout 30s;
    limit_except POST { deny all; }
}

# ── Agent binary download (larger payload, longer timeout) ───────────────
location /api/agent/download {
    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api_cgi.py;
    fastcgi_param PATH_INFO $uri;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param CONTENT_TYPE $content_type;
    fastcgi_param CONTENT_LENGTH $content_length;
    fastcgi_param HTTP_X_TOKEN $http_x_token;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_read_timeout 60s;
    limit_except GET { deny all; }
}

# ── Friendly one-line agent installer (v4.8.0) ───────────────────────────────
# `curl -fsSL https://<server>/install | sh -s -- --token <t>` — the backend
# (handle_agent_install) returns a shell script with THIS server's URL baked in.
# Routed to /api/agent/install by overriding PATH_INFO. Auth-exempt (no secret;
# the caller supplies the one-time --token), exactly like the agent download.
location = /install {
    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api_cgi.py;
    fastcgi_param PATH_INFO /api/agent/install;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param HTTP_HOST $http_host;
    fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    fastcgi_param REQUEST_SCHEME $scheme;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_read_timeout 30s;
    limit_except GET { deny all; }
}

# ── Static frontend ───────────────────────────────────────────────────────
location / {
    try_files $uri $uri/ /index.html;
    # `expires 1h` already emits Cache-Control: max-age=3600. We deliberately
    # do NOT add_header here: in nginx, any add_header in a location disables
    # inheritance of the server-level add_headers — so an explicit
    # Cache-Control here would silently drop CSP / X-Frame-Options / nosniff /
    # Referrer-Policy from every page load. (v3.8.0 hardening.)
    expires 1h;
}

# W6-28: the customer portal is a SEPARATE single-page app (portal.html), not
# the operator SPA. Serve it at the pretty URL /portal that the magic-link email
# links to — without this exact-match the `location /` fallback above would hand
# back the operator index.html (or 404). No add_header, so the server-level CSP /
# security headers inherit (same caveat as `location /`).
location = /portal {
    try_files /portal.html =404;
    expires 1h;
}

# v2.4.15: Service worker must be served without caching so the browser
# always fetches the current version and detects upgrades on next load.
location = /sw.js {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# v2.4.15: PWA manifest — short cache, correct MIME type.
location = /manifest.json {
    expires 1h;
    add_header Cache-Control "public, no-transform";
    add_header Content-Type "application/manifest+json";
}

# v3.13.0: static assets are version-busted in their URL (?v=X.Y.Z, and
# deploy-server.sh further rewrites them to a per-file content hash), so they
# are safe to cache immutably for a year — removing the per-load conditional
# revalidation (304) round-trips of the bare expires/ETag default. Because
# this location sets its own add_header, nginx drops the server-level
# add_headers, so they are re-added here (same caveat as `location /`).
location ^~ /static/ {
    try_files $uri =404;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Block access to data dir if accidentally served.
# Exceptions: manifest.json (PWA) is handled by the exact-match location
# above and will never reach this regex rule.
location ~* \.(json|tmp)$ {
    deny all;
}
