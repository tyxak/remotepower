# /etc/nginx/conf.d/remotepower-ws-map.conf
#
# http{}-context map required by RemotePower's WebSocket proxy locations
# (/api/push/connect → the push daemon; /api/webterm/connect → the web terminal)
# to compute the `Connection:` header for the upgrade handshake.
#
# install-server.sh drops this into /etc/nginx/conf.d/, which nginx.conf includes
# INSIDE the http{} block — the only place a map may live. It only installs this
# file when no `$connection_upgrade` map already exists (defining it twice is an
# nginx error), so a host that already set one up for the web terminal is left
# alone.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
