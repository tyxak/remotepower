# /etc/nginx/sites-available/remotepower
#
# RemotePower — Remote Device Management Service
# Requires: nginx, python3, fcgiwrap
#
# Install:
#   sudo cp remotepower.conf /etc/nginx/sites-available/remotepower
#   sudo ln -s /etc/nginx/sites-available/remotepower /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Replace with your domain or IP

    # Redirect HTTP → HTTPS (recommended — uncomment when TLS is set up)
    # return 301 https://$host$request_uri;

    root /var/www/remotepower;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy — 'unsafe-inline' removed (L1 security fix).
    # All scripts and styles are served from static files; no inline code remains.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;

    # HSTS — only uncomment when HTTPS is fully configured and tested
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Define in the http {} block of /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=rp_api:10m   rate=10r/s;
    #   limit_req_zone $binary_remote_addr zone=rp_login:10m rate=5r/m;
    #   limit_conn_zone $binary_remote_addr zone=rp_conn:10m;
    # NOTE: use $binary_remote_addr only when devices and browsers come
    # from distinct external IPs. On a LAN where the server faces a NAT
    # router, all devices share one IP — rate=30r/m (the old value) will
    # throttle legitimate heartbeats. 10r/s gives burst headroom for a
    # fleet of ~20 devices on a 60-second poll interval.

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/manifest+json;

    # ── Request size cap ──────────────────────────────────────────────────────
    client_max_body_size  2m;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # ── Network exposure / access control (READ THIS if internet-facing) ──────
    # The dashboard authenticates every API call (session token / API key, with
    # rate-limited login + optional 2FA), so auth is the primary control. But if
    # this instance is reachable from the public internet, strongly consider
    # ALSO restricting the API by source IP — or placing the whole thing behind
    # a VPN / mTLS / SSO proxy. The static shell can stay public; /api/ is the
    # sensitive surface.
    #
    # Pattern: keep an allowlist in its own include file and pull it into every
    # /api/ location (see the reference deployment in deploy/nginx/):
    #     # /etc/nginx/snippets/rp-allowlist.conf
    #     allow 203.0.113.7;      # your office / admin IP
    #     allow 10.0.0.0/24;      # your LAN / VPN range
    #     deny  all;
    # then add `include /etc/nginx/snippets/rp-allowlist.conf;` inside each
    # `location /api/...` block below.
    #
    # ⚠ IMPORTANT: agents POST to /api/heartbeat (and enroll / download) — the
    # allowlist MUST include every agent's source IP (your LAN/VPN), or they
    # stop reporting. If agents roam on arbitrary public IPs, do NOT blanket
    # allowlist /api/; rely on the built-in per-device token auth and front the
    # admin surface another way (VPN/SSO). Don't IP-restrict /api/csp-report or
    # you'll lose CSP violation reports from real users' browsers.

    # ── Defense in depth: never serve the CGI directory as static files ───────
    # cgi-bin/ holds the Python backend and lives inside the web root
    # (SCRIPT_FILENAME points at it). It is only ever executed via /api/ through
    # fcgiwrap (SCRIPT_FILENAME is a filesystem path, not this URL), so the
    # /cgi-bin/ URL should never resolve to a static file. `^~` beats the regex
    # matchers below.
    location ^~ /cgi-bin/ {
        deny all;
    }

    # ── API: Python CGI via fcgiwrap ──────────────────────────────────────────
    location /api/ {
        # Optional IP allowlist for internet-facing deployments — see the
        # "Network exposure" note above (must include agent source IPs).
        # include /etc/nginx/snippets/rp-allowlist.conf;

        # Rate limiting — enable after adding zones to /etc/nginx/nginx.conf http block.
        # See the rp_api zone comment above for LAN/NAT fleet caveats.
        # limit_req  zone=rp_api burst=50 nodelay;
        # limit_conn rp_conn 20;

        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;

        # Extended timeout for /api/exec/wait long-poll
        fastcgi_read_timeout 130s;

        limit_except GET POST DELETE PATCH {
            deny all;
        }
    }

    # Stricter rate limit for login endpoint
    location = /api/login {
        # limit_req zone=rp_login burst=3 nodelay;

        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_read_timeout 30s;
        limit_except POST { deny all; }
    }

    # ── Agent binary download (larger payload, longer timeout) ───────────────
    location /api/agent/download {
        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_read_timeout 60s;
        limit_except GET { deny all; }
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # `expires 1h` already emits Cache-Control: max-age=3600. We deliberately
        # do NOT add_header here: in nginx, any add_header in a location disables
        # inheritance of the server-level add_headers — so an explicit
        # Cache-Control here would silently drop CSP / X-Frame-Options / nosniff /
        # Referrer-Policy from every page load. (v3.8.0 hardening.)
        expires 1h;
    }

    # v2.4.15: Service worker must be served without caching so the browser
    # always fetches the current version and detects upgrades on next load.
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # v2.4.15: PWA manifest — short cache, correct MIME type.
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public, no-transform";
        add_header Content-Type "application/manifest+json";
    }

    # Block access to data dir if accidentally served.
    # Exceptions: manifest.json (PWA) is handled by the exact-match location
    # above and will never reach this regex rule.
    location ~* \.(json|tmp)$ {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}

# ── HTTPS (uncomment and set up Let's Encrypt) ─────────────────────────────────
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name remotepower.yourdomain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/remotepower.yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/remotepower.yourdomain.com/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#
#     root /var/www/remotepower;
#     index index.html;
#     ... (same location blocks as above)
# }
