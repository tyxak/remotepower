# /etc/nginx/sites-available/remotepower
#
# RemotePower — Remote Device Management Service
# Requires: nginx, python3, fcgiwrap
#
# Install:
#   sudo cp remotepower.conf /etc/nginx/sites-available/remotepower
#   sudo ln -s /etc/nginx/sites-available/remotepower /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Replace with your domain or IP

    # Redirect HTTP → HTTPS (recommended — uncomment when TLS is set up)
    # return 301 https://$host$request_uri;

    root /var/www/remotepower;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # ── API: Python CGI via fcgiwrap ──────────────────────────────────────────
    location /api/ {
        # Rate limiting (define zone in nginx.conf http block):
        #   limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
        # limit_req zone=api burst=10 nodelay;

        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;

        # Only allow POST/GET/DELETE
        limit_except GET POST DELETE {
            deny all;
        }
    }

    # ── Agent binary download (larger payload, longer timeout) ───────────────
    location /api/agent/download {
        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_read_timeout 60s;
        limit_except GET { deny all; }
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Block access to data dir if accidentally served
    location ~* \.(json|tmp)$ {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}

# ── HTTPS (uncomment and set up Let's Encrypt) ─────────────────────────────────
