# /etc/nginx/sites-available/remotepower
#
# RemotePower — Remote Device Management Service
# Requires: nginx, python3, fcgiwrap
#
# Install:
#   sudo cp remotepower.conf /etc/nginx/sites-available/remotepower
#   sudo ln -s /etc/nginx/sites-available/remotepower /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Replace with your domain or IP

    # Redirect HTTP → HTTPS (recommended — uncomment when TLS is set up)
    # return 301 https://$host$request_uri;

    root /var/www/remotepower;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # v5.5.0: cross-origin isolation — keeps this origin out of other sites'
    # browsing contexts (matches the production deployment).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy — 'unsafe-inline' removed (L1 security fix).
    # All scripts and styles are served from static files; no inline code remains.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;

    # HSTS — only uncomment when HTTPS is fully configured and tested
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Define in the http {} block of /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=rp_api:10m   rate=10r/s;
    #   limit_req_zone $binary_remote_addr zone=rp_login:10m rate=5r/m;
    #   limit_conn_zone $binary_remote_addr zone=rp_conn:10m;
    # NOTE: use $binary_remote_addr only when devices and browsers come
    # from distinct external IPs. On a LAN where the server faces a NAT
    # router, all devices share one IP — rate=30r/m (the old value) will
    # throttle legitimate heartbeats. 10r/s gives burst headroom for a
    # fleet of ~20 devices on a 60-second poll interval.

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/manifest+json;
    gzip_static on;   # serve precompressed .gz assets when present

    # ── Request size cap ──────────────────────────────────────────────────────
    client_max_body_size  2m;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # ── Network exposure / access control (READ THIS if internet-facing) ──────
    # The dashboard authenticates every API call (session token / API key, with
    # rate-limited login + optional 2FA), so auth is the primary control. But if
    # this instance is reachable from the public internet, strongly consider
    # ALSO restricting the API by source IP — or placing the whole thing behind
    # a VPN / mTLS / SSO proxy. The static shell can stay public; /api/ is the
    # sensitive surface.
    #
    # Pattern: keep an allowlist in its own include file and pull it into every
    # /api/ location (see the reference deployment in deploy/nginx/):
    #     # /etc/nginx/snippets/rp-allowlist.conf
    #     allow 203.0.113.7;      # your office / admin IP
    #     allow 10.0.0.0/24;      # your LAN / VPN range
    #     deny  all;
    # then add `include /etc/nginx/snippets/rp-allowlist.conf;` inside each
    # `location /api/...` block below.
    #
    # ⚠ IMPORTANT: agents POST to /api/heartbeat (and enroll / download) — the
    # allowlist MUST include every agent's source IP (your LAN/VPN), or they
    # stop reporting. If agents roam on arbitrary public IPs, do NOT blanket
    # allowlist /api/; rely on the built-in per-device token auth and front the
    # admin surface another way (VPN/SSO). Don't IP-restrict /api/csp-report or
    # you'll lose CSP violation reports from real users' browsers.

    # ── Routing: all location {} blocks live in a shared snippet so the HTTP
    # and HTTPS servers can't drift (v4.5.0). It also serves /ca.crt for agent
    # bootstrap. Installed to /etc/nginx/snippets/ by install-server.sh.
    include snippets/remotepower-locations.conf;

    # Logs
    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
# Uncomment this whole block once you have a cert. Two supported paths:
#
#   (1) Real cert (RECOMMENDED): `sudo certbot --nginx -d your.domain` — certbot
#       fills in the ssl_certificate lines for you. Or acme.sh for DNS-01.
#   (2) Self-signed CA (internal-only): `sudo make tls-selfsigned HOST=rp.internal`
#       (or tools/gen-ca.sh --host rp.internal --nginx). It writes
#       /etc/nginx/snippets/remotepower-ssl.conf with the ssl_certificate lines —
#       then just `include` it below instead of the two ssl_certificate lines.
#
# The location blocks (incl. /ca.crt) come from the SAME shared snippet the HTTP
# server uses, so the two never drift. When this is live, switch the HTTP server
# above to redirect — but keep /ca.crt and the ACME challenge reachable on :80.
#
# server {
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     http2 on;
#     server_name remotepower.yourdomain.com;   # or your internal hostname
#
#     root /var/www/remotepower;
#     index index.html;
#
#     # --- TLS: pick ONE ---
#     # (1) real cert:
#     # ssl_certificate     /etc/letsencrypt/live/your.domain/fullchain.pem;
#     # ssl_certificate_key /etc/letsencrypt/live/your.domain/privkey.pem;
#     # ssl_protocols TLSv1.2 TLSv1.3;
#     # (2) self-signed CA (written by tools/gen-ca.sh --nginx):
#     # include snippets/remotepower-ssl.conf;
#
#     # Same security headers as the HTTP server, plus HSTS (safe once TLS works):
#     add_header X-Frame-Options "DENY" always;
#     add_header X-Content-Type-Options "nosniff" always;
#     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#     add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
#     add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;
#     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
#
#     gzip on;
#     gzip_types text/html text/css application/javascript application/json application/manifest+json;
#     client_max_body_size 2m;
#
#     include snippets/remotepower-locations.conf;
#
#     access_log /var/log/nginx/remotepower_access.log;
#     error_log  /var/log/nginx/remotepower_error.log;
# }
