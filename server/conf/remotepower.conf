# /etc/nginx/sites-available/remotepower
#
# RemotePower — Remote Device Management Service
# Requires: nginx, python3, fcgiwrap
#
# Install:
#   sudo cp remotepower.conf /etc/nginx/sites-available/remotepower
#   sudo ln -s /etc/nginx/sites-available/remotepower /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Replace with your domain or IP

    # Redirect HTTP → HTTPS (recommended — uncomment when TLS is set up)
    # return 301 https://$host$request_uri;

    root /var/www/remotepower;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy: no unsafe-inline — uses nonce or hash in production.
    # The dashboard JS is all inline (single-file design), so we use a per-request
    # nonce approach via nginx sub_filter, OR accept the tradeoff of 'strict-dynamic'.
    # For self-hosted setups without sub_filter, this policy blocks third-party
    # scripts and unknown origins while still allowing the inline dashboard code.
    # To eliminate 'unsafe-inline' fully: split JS into /static/app.js and serve
    # with a hash-based CSP (see README security hardening section).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS — only uncomment when HTTPS is fully configured and tested
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Define in the http {} block of /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=rp_api:10m rate=30r/m;
    #   limit_req_zone $binary_remote_addr zone=rp_login:10m rate=5r/m;
    #   limit_conn_zone $binary_remote_addr zone=rp_conn:10m;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # ── Request size cap ──────────────────────────────────────────────────────
    client_max_body_size  64k;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # ── API: Python CGI via fcgiwrap ──────────────────────────────────────────
    location /api/ {
        # Rate limiting — enable after adding zones to /etc/nginx/nginx.conf http block:
        #   limit_req_zone $binary_remote_addr zone=rp_api:10m   rate=30r/m;
        #   limit_req_zone $binary_remote_addr zone=rp_login:10m rate=5r/m;
        #   limit_conn_zone $binary_remote_addr zone=rp_conn:10m;
        # limit_req  zone=rp_api burst=20 nodelay;
        # limit_conn rp_conn 20;

        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;

        # Extended timeout for /api/exec/wait long-poll
        fastcgi_read_timeout 130s;

        limit_except GET POST DELETE PATCH {
            deny all;
        }
    }

    # Stricter rate limit for login endpoint
    location = /api/login {
        # limit_req zone=rp_login burst=3 nodelay;

        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_read_timeout 30s;
        limit_except POST { deny all; }
    }

    # ── Agent binary download (larger payload, longer timeout) ───────────────
    location /api/agent/download {
        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_TOKEN $http_x_token;
        fastcgi_param RP_DATA_DIR /var/lib/remotepower;
        fastcgi_read_timeout 60s;
        limit_except GET { deny all; }
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Block access to data dir if accidentally served
    location ~* \.(json|tmp)$ {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}

# ── HTTPS (uncomment and set up Let's Encrypt) ─────────────────────────────────
