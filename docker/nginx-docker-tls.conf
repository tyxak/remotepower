# RemotePower - Docker Nginx config (self-signed TLS, opt-in via RP_TLS_SELFSIGNED=1).
# The entrypoint generates /var/lib/remotepower/tls/{ca,server}.{crt,key} on first
# boot and activates this config. Two servers:
#   :8080  plain HTTP — keeps the container healthcheck working and serves /ca.crt
#          (the bootstrap CA download); everything else redirects to HTTPS.
#   :8443  the full app over TLS.
# Map host 443 -> container 8443 (see docker-compose.yml). See docs/tls-selfsigned.md.

server {
    listen 8080;
    server_name _;
    root /var/www/remotepower;

    # /api/health must answer over HTTP for the container healthcheck.
    location = /api/health {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CA download for agent bootstrap (pinned by fingerprint — HTTP is fine).
    location = /ca.crt {
        alias /var/lib/remotepower/tls/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="ca.crt"';
    }

    # Everything else → HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    root /var/www/remotepower;
    index index.html;

    ssl_certificate     /var/lib/remotepower/tls/server.crt;
    ssl_certificate_key /var/lib/remotepower/tls/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:RPTLS:10m;
    ssl_session_tickets off;

    # Security headers (+ HSTS, safe under TLS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    client_max_body_size  2m;
    client_body_timeout   10s;
    client_header_timeout 10s;

    include snippets/remotepower-docker-locations.conf;

    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}
