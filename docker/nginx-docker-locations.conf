# RemotePower (Docker) — shared location {} blocks, included by both the HTTP
# (:8080) and the optional HTTPS (:8443) server in the container so they can't
# drift. Server-level directives (headers, gzip, body caps) stay in each server.

# Defense in depth: never serve the backend dir (wsgi.py/api.py) as static files.
location ^~ /cgi-bin/ {
    deny all;
}

# CA cert for agent bootstrap (v4.5.0). 404s harmlessly when no self-signed CA
# is generated. Clients pin it by SHA-256 fingerprint, so HTTP is fine.
location = /ca.crt {
    alias /var/lib/remotepower/tls/ca.crt;
    default_type application/x-x509-ca-cert;
    add_header Content-Disposition 'attachment; filename="ca.crt"';
}

# API backend — persistent gunicorn/Flask app tier (v6.1.0+, the only server
# path). server/cgi-bin/wsgi.py is a real Flask app; the entrypoint starts
# gunicorn unconditionally on 127.0.0.1:8090 (docker/entrypoint.sh). See
# docs/wsgi.md.
location /api/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 130s;
    limit_except GET POST DELETE PATCH { deny all; }
}

location = /api/login {
    proxy_pass http://127.0.0.1:8090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    limit_except POST { deny all; }
}

# Agent binary download
location /agent/ {
    root /var/www/remotepower;
    add_header Content-Disposition 'attachment; filename=remotepower-agent';
    add_header Content-Type application/octet-stream;
}

# Agent install one-liner — rewrites the proxied path to /api/agent/install
# (auth-exempt; the caller supplies the one-time --token, like the agent
# download). Mirrors the production conf so
# `curl -fsSL https://host/install | sh` works against Docker too.
location = /install {
    proxy_pass http://127.0.0.1:8090/api/agent/install$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    limit_except GET { deny all; }
}

# Service worker must never be cached, or the browser serves a stale SW (up to
# the `expires 1h` below) after an image upgrade and never detects the new
# version. Exact-match wins over the `location /` prefix regardless of order.
location = /sw.js {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# Frontend
location / {
    try_files $uri $uri/ /index.html;
    # No add_header here: `expires 1h` already sets Cache-Control, and any
    # add_header in a location disables inheritance of the server-level
    # security headers (CSP / X-Frame-Options / nosniff). (v3.8.0 hardening.)
    expires 1h;
}

# W6-28: serve the customer portal SPA (portal.html) at the pretty URL /portal
# the magic-link email points to — else `location /` returns the operator
# index.html. No add_header, so the server-level security headers inherit.
location = /portal {
    try_files /portal.html =404;
    expires 1h;
}

# Block data files
location ~* \.(json|tmp)$ { deny all; }
