# RemotePower (Docker) — shared location {} blocks, included by both the HTTP
# (:8080) and the optional HTTPS (:8443) server in the container so they can't
# drift. Server-level directives (headers, gzip, body caps) stay in each server.

# Defense in depth: never serve the CGI directory as static files.
location ^~ /cgi-bin/ {
    deny all;
}

# CA cert for agent bootstrap (v4.5.0). 404s harmlessly when no self-signed CA
# is generated. Clients pin it by SHA-256 fingerprint, so HTTP is fine.
location = /ca.crt {
    alias /var/lib/remotepower/tls/ca.crt;
    default_type application/x-x509-ca-cert;
    add_header Content-Disposition 'attachment; filename="ca.crt"';
}

# API via fcgiwrap
location /api/ {
    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
    fastcgi_param PATH_INFO $uri;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param CONTENT_TYPE $content_type;
    fastcgi_param CONTENT_LENGTH $content_length;
    fastcgi_param HTTP_X_TOKEN $http_x_token;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param REMOTE_ADDR $remote_addr;
    fastcgi_read_timeout 130s;
    limit_except GET POST DELETE PATCH { deny all; }
}

location = /api/login {
    include fastcgi_params;
    fastcgi_pass unix:/run/fcgiwrap.socket;
    fastcgi_param SCRIPT_FILENAME /var/www/remotepower/cgi-bin/api.py;
    fastcgi_param PATH_INFO $uri;
    fastcgi_param REQUEST_METHOD $request_method;
    fastcgi_param CONTENT_TYPE $content_type;
    fastcgi_param CONTENT_LENGTH $content_length;
    fastcgi_param HTTP_X_TOKEN $http_x_token;
    fastcgi_param RP_DATA_DIR /var/lib/remotepower;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param REMOTE_ADDR $remote_addr;
    fastcgi_read_timeout 30s;
    limit_except POST { deny all; }
}

# Agent binary download
location /agent/ {
    root /var/www/remotepower;
    add_header Content-Disposition 'attachment; filename=remotepower-agent';
    add_header Content-Type application/octet-stream;
}

# Frontend
location / {
    try_files $uri $uri/ /index.html;
    # No add_header here: `expires 1h` already sets Cache-Control, and any
    # add_header in a location disables inheritance of the server-level
    # security headers (CSP / X-Frame-Options / nosniff). (v3.8.0 hardening.)
    expires 1h;
}

# Block data files
location ~* \.(json|tmp)$ { deny all; }
