# RemotePower - Docker Nginx config (HTTP)
# Listens on 8080 (unprivileged), no IPv6. TLS termination is expected at a
# reverse proxy in front. For in-container TLS, set RP_TLS_SELFSIGNED=1 (the
# entrypoint swaps in nginx-docker-tls.conf). See docs/tls-selfsigned.md.

server {
    listen 8080;
    server_name _;

    root /var/www/remotepower;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report;" always;

    # Gzip
    gzip on;
    # v2.2.6: text/html removed — nginx always gzips text/html implicitly,
    # listing it here triggers a "duplicate MIME type" warning at startup.
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Request size
    client_max_body_size  2m;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # Routing — shared with the TLS server (no drift). Installed to
    # /etc/nginx/snippets/ by the Dockerfile.
    include snippets/remotepower-docker-locations.conf;

    access_log /var/log/nginx/remotepower_access.log;
    error_log  /var/log/nginx/remotepower_error.log;
}
