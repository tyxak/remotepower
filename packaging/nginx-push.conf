# nginx snippet to proxy the agent push (wake-nudge) channel WebSocket to
# the remotepower-push daemon. Drop into your existing `server { ... }`
# block or include from /etc/nginx/snippets/.
#
# EXPERIMENTAL / opt-in (docs/master-improvement-scoping-internal.md #1):
# only install this if you've turned on Settings -> push_enabled AND can
# validate the daemon under your own fleet's real concurrent-connection
# load -- this has not been verified at scale. Without this snippet (and
# the daemon) installed, the product behaves exactly as before; the agent
# only ever falls back to its normal poll interval.
#
# This MUST sit *above* any catch-all `location /` block in the same
# server, same reasoning as nginx-webterm.conf's own note.

location = /api/push/connect {
    proxy_pass http://127.0.0.1:8766;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;   # see nginx-webterm.conf for the map{} this needs
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_request_buffering off;

    # Connections are meant to be long-lived (that's the whole point); the
    # daemon's own ping_interval=20/ping_timeout=20 keeps them from ever
    # actually going idle.
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
}
