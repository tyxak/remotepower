# nginx snippet to proxy the web terminal WebSocket to the
# remotepower-webterm daemon. Drop into your existing
# `server { ... }` block or include from /etc/nginx/snippets/.
#
# Requires nginx 1.3.13+ (every distro since Debian 9 / Ubuntu 18.04).
#
# This MUST sit *above* any catch-all `location /` block in the same
# server, or nginx's longest-prefix-match will route /api/webterm/connect
# to the catch-all. The CGI's other /api/webterm/auth and /api/webterm/audit
# paths are still served by fcgiwrap as usual — the prefix here is the
# specific /api/webterm/connect path.

location = /api/webterm/connect {
    # Map standard HTTP to WebSocket upgrade. nginx variables:
    #   $connection_upgrade is "upgrade" if the client sent Upgrade,
    #                       "" otherwise. Defined in the http {} block:
    #
    #     map $http_upgrade $connection_upgrade {
    #         default upgrade;
    #         '' close;
    #     }
    #
    # Without that map, replace $connection_upgrade with the literal "upgrade".
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # No buffering — terminal output should reach the browser immediately.
    proxy_buffering off;
    proxy_request_buffering off;

    # Long timeout — terminal sessions can be idle for a while. The
    # daemon does its own keepalive ping every 20s so the connection
    # shouldn't actually go idle, but we want a generous ceiling.
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
}
