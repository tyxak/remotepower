# RemotePower — one command:
#
#     docker compose up -d
#
# Then open the URL and grab the one-time admin password from:
#
#     docker logs remotepower
#
# HTTPS works out of the box with a self-signed CA (the CA fingerprint is in the
# logs — agents pin it). Point RP_TLS_HOST at the address your agents/browsers
# actually use so the certificate matches it, e.g.:
#
#     RP_TLS_HOST=rp.lan docker compose up -d
#
# This is the single-node "enterprise" default: Postgres + the persistent
# gunicorn WSGI tier + the out-of-band scheduler + a co-located scanner
# satellite, all in this one compose stack. Comment out env vars / services
# below to opt back down to the lightweight single-file/CGI/no-scanner setup.
services:
  remotepower:
    image: ghcr.io/tyxak/remotepower:latest   # or `build: .` to build locally
    container_name: remotepower
    restart: unless-stopped
    ports:
      - "443:8443"   # HTTPS — self-signed by default
      - "80:8080"    # HTTP  — health, /ca.crt, redirects to HTTPS
    environment:
      # HTTPS on first boot, no cert wrangling. Set RP_TLS_HOST to your address:
      RP_TLS_SELFSIGNED: "1"
      RP_TLS_HOST: "${RP_TLS_HOST:-localhost}"
      # Admin password is GENERATED and printed ONCE to `docker logs` on first
      # boot — no insecure default to remember to change. Override if you must:
      # RP_ADMIN_PASS: "your-strong-password"
      # Encrypt disaster-recovery backups at rest (AES-256-GCM). In Docker the
      # passphrase goes HERE (or a docker secret) — NOT /etc/remotepower/api.env,
      # which is the systemd path and doesn't exist in the container. Without it,
      # scheduled backups are written in PLAINTEXT.
      # RP_BACKUP_PASSPHRASE: "${RP_BACKUP_PASSPHRASE:-}"
      # ── Single-node enterprise topology — all default ON ───────────────────
      # gunicorn+Flask (server/cgi-bin/wsgi.py) is the only server, started
      # unconditionally by the entrypoint. Run the maintenance sweeps from a
      # dedicated in-container process instead. See docs/wsgi.md and docs/scaling.md.
      RP_EXTERNAL_SCHEDULER: "1"   # run scheduler.py; request path stops the cadence
      RP_WITH_SCANNER: "1"         # mint a token for the `scanner` service below
      # Point the storage backend at the postgres service below:
      RP_STORAGE_BACKEND: "postgres"
      RP_PG_DSN: "postgresql://rp:${RP_PG_PASSWORD:-remotepower-dev-changeme}@postgres:5432/remotepower"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - remotepower_data:/var/lib/remotepower
    healthcheck:
      # curl isn't in the image — probe /api/health with Python (always present).
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/health',timeout=4).status==200 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3

  # PostgreSQL backend — for large fleets / multiple app nodes the default
  # single-file SQLite/JSON store also works fine; drop this service and the
  # RP_STORAGE_BACKEND/RP_PG_DSN env above to opt back down to it (existing
  # Postgres data then needs tools/migrate_storage.py run the other way, or
  # start fresh on the file backend).
  postgres:
    image: postgres:16-alpine
    container_name: remotepower-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: remotepower
      POSTGRES_USER: rp
      # Not exposed to the host (no `ports:` mapping) — only reachable from
      # other containers on this compose network. Still, override for
      # anything beyond local/lab use: RP_PG_PASSWORD=... docker compose up -d
      POSTGRES_PASSWORD: "${RP_PG_PASSWORD:-remotepower-dev-changeme}"
    volumes:
      - remotepower_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rp -d remotepower"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Scanner satellite — the Security → Pentest scan worker. Reads its token
  # from the shared data volume once `remotepower` mints it (RP_WITH_SCANNER
  # above); see Dockerfile.scanner for why it runs nuclei directly instead of
  # via a Docker-socket-mounted sibling container. Comment this service out
  # (and RP_WITH_SCANNER above) to opt out and set one up on a separate
  # machine per docs/security-scans.md instead — the doc's recommended,
  # better-isolated path.
  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: remotepower-scanner
    restart: unless-stopped
    depends_on:
      - remotepower
    volumes:
      - remotepower_data:/var/lib/remotepower:ro

volumes:
  remotepower_data:
  remotepower_pg:
