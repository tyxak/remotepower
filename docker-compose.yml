services:
  remotepower:
    build: .
    # Or use a published image instead of building locally:
    # image: tyxak/remotepower:latest
    container_name: remotepower
    ports:
      # Host port defaults to 8085 (8080 clashes on many machines). Override
      # with:  RP_HOST_PORT=NNNN docker compose up -d
      - "${RP_HOST_PORT:-8085}:8080"
    environment:
      - RP_ADMIN_USER=admin
      - RP_ADMIN_PASS=changeme          # Change this! Only used on first run.
    volumes:
      - remotepower_data:/var/lib/remotepower
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  remotepower_data:
